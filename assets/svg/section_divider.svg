<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 20" width="400" height="20">
  <defs>
    <linearGradient id="divLineL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" style="stop-color:#C5961A;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#C5961A;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="divLineR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" style="stop-color:#C5961A;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#C5961A;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- LEFT DECORATIVE END -->
  <!-- Small wave -->
  <path d="M30,10 Q38,5 46,10 Q54,15 62,10" style="fill:none;stroke:#2980b9;stroke-width:1;opacity:0.5;"/>
  <!-- Wave foam -->
  <circle cx="46" cy="7" r="0.7" style="fill:#5dade2;opacity:0.3;"/>

  <!-- Staff end left -->
  <line x1="70" y1="4" x2="70" y2="16" style="stroke:#5a3215;stroke-width:1.8;stroke-linecap:round;opacity:0.5;"/>
  <line x1="70" y1="4" x2="70" y2="16" style="stroke:#7a4a25;stroke-width:0.8;stroke-linecap:round;opacity:0.5;"/>

  <!-- LEFT LINE (fade in from left) -->
  <line x1="20" y1="10" x2="80" y2="10" style="stroke:url(#divLineL);stroke-width:0.8;"/>

  <!-- LEFT CONNECTING LINE -->
  <line x1="80" y1="10" x2="180" y2="10" style="stroke:#C5961A;stroke-width:0.8;opacity:0.6;"/>

  <!-- CENTER DECORATIVE ELEMENT -->
  <!-- Diamond -->
  <polygon points="192,10 200,4 208,10 200,16" style="fill:none;stroke:#C5961A;stroke-width:0.8;opacity:0.6;"/>
  <!-- Inner diamond -->
  <polygon points="196,10 200,7 204,10 200,13" style="fill:#C5961A;opacity:0.3;"/>
  <!-- Tiny flame above center -->
  <path d="M200,4 Q198.5,1 199.5,-1 Q200,-2.5 200.5,-1 Q201.5,1 200,4 Z" style="fill:#C5961A;opacity:0.35;"/>

  <!-- RIGHT CONNECTING LINE -->
  <line x1="220" y1="10" x2="320" y2="10" style="stroke:#C5961A;stroke-width:0.8;opacity:0.6;"/>

  <!-- RIGHT LINE (fade out to right) -->
  <line x1="320" y1="10" x2="380" y2="10" style="stroke:url(#divLineR);stroke-width:0.8;"/>

  <!-- Staff end right -->
  <line x1="330" y1="4" x2="330" y2="16" style="stroke:#5a3215;stroke-width:1.8;stroke-linecap:round;opacity:0.5;"/>
  <line x1="330" y1="4" x2="330" y2="16" style="stroke:#7a4a25;stroke-width:0.8;stroke-linecap:round;opacity:0.5;"/>

  <!-- RIGHT DECORATIVE END -->
  <!-- Small wave -->
  <path d="M338,10 Q346,5 354,10 Q362,15 370,10" style="fill:none;stroke:#2980b9;stroke-width:1;opacity:0.5;"/>
  <!-- Wave foam -->
  <circle cx="354" cy="7" r="0.7" style="fill:#5dade2;opacity:0.3;"/>

  <!-- Small dots along the line for texture -->
  <circle cx="110" cy="10" r="0.6" style="fill:#C5961A;opacity:0.3;"/>
  <circle cx="140" cy="10" r="0.6" style="fill:#C5961A;opacity:0.3;"/>
  <circle cx="170" cy="10" r="0.6" style="fill:#C5961A;opacity:0.3;"/>
  <circle cx="230" cy="10" r="0.6" style="fill:#C5961A;opacity:0.3;"/>
  <circle cx="260" cy="10" r="0.6" style="fill:#C5961A;opacity:0.3;"/>
  <circle cx="290" cy="10" r="0.6" style="fill:#C5961A;opacity:0.3;"/>
</svg>